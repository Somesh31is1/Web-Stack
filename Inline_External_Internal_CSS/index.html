<!DOCTYPE html>
<html>
<head>

    <title>CSS Types Demo</title>


    <link rel="stylesheet" href="style.css">

    <style>

        p
        {
            color: blue;
            font-size: 20px;
        }

        table
        {
            border-collapse: collapse;
            width: 50%;
        }

        th, td
        {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

    </style>

</head>

<body>


    <h1 style="color:red; text-align:center;">
        Welcome to CSS
    </h1>


    <p>
        This paragraph uses Internal CSS.
    </p>

    <h2>
        This heading uses External CSS.
    </h2>

    <br>

    <table>

        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>

        <tr>
            <td>Somesh</td>
            <td>20</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>21</td>
        </tr>

    </table>

</body>
</html>
